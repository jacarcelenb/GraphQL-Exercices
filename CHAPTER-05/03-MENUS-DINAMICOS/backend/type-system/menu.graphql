 type Menu {
    mn_id: Int!
    mn_name: String!
    mn_route: String!
    mn_icon: String!
  }

  type Query {
    menus: [Menu]
    menu(mn_id: Int!): Menu
  }

  input MenuInput {
    mn_name: String!
    mn_route: String!
    mn_icon: String!
  }

  input MenuUpdateInput {
    mn_name: String
    mn_route: String
    mn_icon: String
  }

  type Mutation {
    addMenu(input: MenuInput!): Menu
    updateMenu(mn_id: Int!, input: MenuUpdateInput!): Menu
    deleteMenu(mn_id: Int!): Menu
  }